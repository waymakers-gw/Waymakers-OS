name: Client Meeting Digest

on:
  schedule:
    # Runs at 07:00 UTC daily. Adjust for your timezone (Melbourne is
    # UTC+10 or UTC+11 depending on daylight saving) — e.g. 21:00 UTC
    # lands at ~7-8am Melbourne time.
    - cron: "0 21 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run digest
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: python digest.py
